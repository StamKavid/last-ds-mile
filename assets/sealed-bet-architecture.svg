<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="lineArrow" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#fbfcfe"/>

  <!-- ============ TITLE ============ -->
  <text x="60" y="90" font-size="52" font-weight="800" fill="#0f172a">Last DS Mile</text>
  <rect x="63" y="104" width="150" height="5" rx="2.5" fill="#4338ca"/>
  <text x="60" y="146" font-size="20" fill="#475569">A guided data-science lifecycle for coding agents — leakage and honesty checks built into every stage.</text>

  <!-- top-right trust markers -->
  <g font-size="14" fill="#475569">
    <rect x="1250" y="50" width="86" height="30" rx="15" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1293" y="70" text-anchor="middle" font-weight="600">MIT</text>
    <rect x="1346" y="50" width="204" height="30" rx="15" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1448" y="70" text-anchor="middle" font-weight="600">Claude Code Plugin</text>
  </g>

  <!-- ============ PIPELINE (the TL;DR) ============ -->
  <text x="60" y="205" font-size="16" font-weight="700" fill="#64748b" letter-spacing="0.5">THE PIPELINE</text>

  <line x1="100" y1="280" x2="1500" y2="280" stroke="#cbd5e1" stroke-width="2.5"/>

  <!-- 11 stage nodes -->
  <g font-size="14" font-weight="700" fill="#0f172a">
    <circle cx="100" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="100" y="286" text-anchor="middle">0</text>
    <circle cx="240" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="240" y="286" text-anchor="middle">1</text>
    <circle cx="380" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="380" y="286" text-anchor="middle">2</text>
    <circle cx="520" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="520" y="286" text-anchor="middle">3</text>
    <circle cx="660" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="660" y="286" text-anchor="middle">4</text>
    <circle cx="800" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="800" y="286" text-anchor="middle">5</text>
    <circle cx="940" cy="280" r="21" fill="#ffffff" stroke="#4338ca" stroke-width="3"/>
    <text x="940" y="286" text-anchor="middle" fill="#4338ca">6</text>
    <circle cx="1080" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="1080" y="286" text-anchor="middle">7</text>
    <circle cx="1220" cy="280" r="21" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <text x="1220" y="286" text-anchor="middle">8</text>
    <circle cx="1360" cy="280" r="21" fill="#ffffff" stroke="#4338ca" stroke-width="3"/>
    <text x="1360" y="286" text-anchor="middle" fill="#4338ca">9</text>
    <circle cx="1500" cy="280" r="21" fill="#ffffff" stroke="#4338ca" stroke-width="3"/>
    <text x="1500" y="286" text-anchor="middle" fill="#4338ca">10</text>
  </g>

  <!-- stage labels -->
  <g font-size="14.5" fill="#334155" text-anchor="middle">
    <text x="100" y="325">Frame</text>
    <text x="240" y="325">Data</text>
    <text x="380" y="325">EDA</text>
    <text x="520" y="325">Prep</text>
    <text x="660" y="325">Baseline</text>
    <text x="800" y="325">Validate</text>
    <text x="940" y="325" font-weight="700" fill="#4338ca">Model</text>
    <text x="1080" y="325">Evaluate</text>
    <text x="1220" y="325">Explain</text>
    <text x="1360" y="325" font-weight="700" fill="#4338ca">Report</text>
    <text x="1500" y="325" font-weight="700" fill="#4338ca">Handoff</text>
  </g>

  <!-- gate lock icons above the 3 gated stages -->
  <g fill="none" stroke="#4338ca" stroke-width="2.5">
    <path d="M932 228 L932 220 C932 214 936 210 940 210 C944 210 948 214 948 220 L948 228" />
    <rect x="928" y="228" width="24" height="20" rx="3" fill="#eef2ff" stroke="#4338ca"/>
    <path d="M1352 228 L1352 220 C1352 214 1356 210 1360 210 C1364 210 1368 214 1368 220 L1368 228" />
    <rect x="1348" y="228" width="24" height="20" rx="3" fill="#eef2ff" stroke="#4338ca"/>
    <path d="M1492 228 L1492 220 C1492 214 1496 210 1500 210 C1504 210 1508 214 1508 220 L1508 228" />
    <rect x="1488" y="228" width="24" height="20" rx="3" fill="#eef2ff" stroke="#4338ca"/>
  </g>
  <text x="1500" y="196" font-size="13.5" fill="#4338ca" font-weight="700" text-anchor="middle">3 Hard Gates</text>
  <text x="1500" y="352" font-size="13" fill="#64748b" text-anchor="middle">stop and ask, never</text>
  <text x="1500" y="368" font-size="13" fill="#64748b" text-anchor="middle">silently proceed</text>

  <!-- ============ TWO SUPPORTING CARDS ============ -->
  <!-- left card: what the gates actually require -->
  <rect x="60" y="430" width="700" height="220" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="90" y="470" font-size="19" font-weight="700" fill="#0f172a">Discipline, not just steps</text>
  <g font-size="16" fill="#334155">
    <circle cx="100" cy="505" r="4" fill="#4338ca"/>
    <text x="115" y="510">Model requires a baseline and a validation strategy first</text>
    <circle cx="100" cy="540" r="4" fill="#4338ca"/>
    <text x="115" y="545">Report requires slice/subgroup performance, not one aggregate metric</text>
    <circle cx="100" cy="575" r="4" fill="#4338ca"/>
    <text x="115" y="580">Handoff requires a pinned environment before packaging a model</text>
  </g>
  <text x="90" y="620" font-size="15" fill="#64748b">Plus 8 domain skills that auto-trigger on leakage, imbalance, and metric-selection risks.</text>

  <!-- right card: Sealed Bet experimental track -->
  <rect x="800" y="430" width="740" height="220" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="830" y="470" font-size="19" font-weight="700" fill="#0f172a">Sealed Bet <tspan font-size="14" font-weight="600" fill="#0d9488">(experimental)</tspan></text>
  <text x="830" y="497" font-size="15" fill="#475569">An alternative, portable trust core — for any coding agent:</text>

  <g font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">
    <circle cx="880" cy="545" r="26" fill="#ffffff" stroke="#0d9488" stroke-width="2.5"/>
    <text x="880" y="551">Seal</text>
    <circle cx="1050" cy="545" r="26" fill="#ffffff" stroke="#0d9488" stroke-width="2.5"/>
    <text x="1050" y="551">Build</text>
    <circle cx="1220" cy="545" r="26" fill="#ffffff" stroke="#0d9488" stroke-width="2.5"/>
    <text x="1220" y="551">Open</text>
  </g>
  <line x1="908" y1="545" x2="1022" y2="545" stroke="#94a3b8" stroke-width="2" marker-end="url(#lineArrow)"/>
  <line x1="1078" y1="545" x2="1192" y2="545" stroke="#94a3b8" stroke-width="2" marker-end="url(#lineArrow)"/>

  <text x="830" y="600" font-size="14.5" fill="#475569">Lock a holdout, build autonomously, open once —</text>
  <text x="830" y="620" font-size="14.5" fill="#475569">ship only if lift over baseline clears 2σ.</text>
  <text x="830" y="642" font-size="13.5" fill="#0d9488" font-weight="600">/ds-seal · /ds-auto · /ds-open</text>

  <!-- ============ BOTTOM TRUST BAR ============ -->
  <rect x="60" y="700" width="1480" height="70" rx="35" fill="#0f172a"/>
  <g font-size="15.5" fill="#e2e8f0" font-weight="600">
    <text x="100" y="742">Portable trust core</text>
    <line x1="330" y1="716" x2="330" y2="754" stroke="#334155"/>
    <text x="360" y="742">5 safety hooks</text>
    <line x1="540" y1="716" x2="540" y2="754" stroke="#334155"/>
    <text x="570" y="742">3 subagents</text>
    <line x1="740" y1="716" x2="740" y2="754" stroke="#334155"/>
    <text x="770" y="742">Zero network calls in any hook</text>
    <line x1="1060" y1="716" x2="1060" y2="754" stroke="#334155"/>
    <text x="1090" y="742">156+ tests</text>
    <line x1="1250" y1="716" x2="1250" y2="754" stroke="#334155"/>
    <text x="1280" y="742">Works with any coding agent</text>
  </g>
</svg>
