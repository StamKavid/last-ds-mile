# Run by prek (https://github.com/j178/prek), the Rust reimplementation of
# pre-commit. It reads this file unchanged, so the classic `pre-commit` runner
# also works if a contributor prefers it.
#
#   uv tool install prek
#   prek install
#
# Run against everything without committing:  prek run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      # ruff-format is deliberately NOT enabled yet. This codebase uses
      # hand-aligned continuation style throughout; adopting the formatter
      # rewrites ~1944 lines across 33 of 36 files, which would bury the
      # commit history under a formatting pass and churn the benchmarks/
      # scripts that are committed as reproducibility evidence. Revisit as a
      # single deliberate commit after the first public release.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      # Keeps model binaries and raw CSVs out of git, matching .gitignore's
      # "narrative evidence yes, heavy artifacts no" convention.
      - id: check-added-large-files
        args: [--maxkb=2048]
