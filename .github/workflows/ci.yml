name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: ruff check
        # Formatting is intentionally not enforced yet -- see the note in
        # .pre-commit-config.yaml.
        run: uv run ruff check .

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev dependencies
        # Core + dev only. The `benchmarks` extra (AutoGluon) is deliberately
        # not installed: nothing in tests/ imports it, and pulling it would add
        # minutes to every run.
        run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Full suite
        run: uv run pytest
      - name: Consumer-facing guarantees
        # Called out separately because these two protect anyone who installs
        # the plugin: structure/frontmatter/command-skill wiring, and the
        # runtime behavior of the five hooks.
        run: uv run pytest tests/test_plugin_structure.py tests/test_hooks.py -v

  security:
    name: skillspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install SkillSpector
        run: uv tool install git+https://github.com/NVIDIA/skillspector.git
      - name: Scan against the documented baseline
        # Static-only: no API key needed, and deterministic. The LLM pass is run
        # manually before a release, not on every push.
        #
        # This FAILS on any finding not already justified in
        # .skillspector-baseline.yaml. That is the point: the baseline is a list
        # of findings someone wrote a reason for, so a new one means either a
        # real issue or a reason still to be written.
        run: skillspector scan . --no-llm --baseline .skillspector-baseline.yaml
      - name: SARIF for code scanning
        if: always()
        run: skillspector scan . --no-llm --baseline .skillspector-baseline.yaml --format sarif --output skillspector.sarif
      - uses: github/codeql-action/upload-sarif@v3
        # Requires GitHub Advanced Security (or a public repo). Non-blocking so
        # a private repo without GHAS does not fail the build on upload alone.
        continue-on-error: true
        if: always()
        with:
          sarif_file: skillspector.sarif

  benchmarks:
    name: pytest + AutoGluon (full 217)
    runs-on: ubuntu-latest
    # The `test` job above skips 7 tests that need the optional `benchmarks`
    # extra (sealed_bet.auto's run_iteration / ceiling_baseline proxy /
    # refit_winner). Without this job nothing would ever exercise the Build
    # loop's AutoGluon path in CI. Split out rather than folded into the
    # matrix because the install is heavy and only needs one interpreter.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev --extra benchmarks
      - name: Assert AutoGluon really imported
        # Guards against the failure mode found while migrating: `autogluon`
        # is a namespace package, so a broken transitive dep leaves the spec
        # resolvable while the real import raises -- which would silently skip
        # all 7 tests here and turn this job into a no-op that looks green.
        run: uv run python -c "from autogluon.tabular import TabularPredictor"
      - name: Full suite (expects 217 passed, 0 skipped)
        run: uv run pytest
