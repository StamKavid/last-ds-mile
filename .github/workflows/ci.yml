name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: plugin tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        # Pure-stdlib hooks; the only test dependencies are pytest and PyYAML
        # (used to parse SKILL.md frontmatter). No package to build, no lockfile.
        run: python -m pip install --upgrade pip pytest pyyaml
      - name: Consumer-facing guarantees
        # These protect anyone who installs the plugin: plugin structure /
        # frontmatter / command-skill wiring, and the runtime behavior of the
        # four hooks that read your data and notebooks.
        run: python -m pytest
