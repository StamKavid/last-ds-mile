# SkillSpector baseline — accepted findings, each with the reason it is accepted.
#
# `skillspector baseline .` auto-generates content-hash fingerprints with the
# reason "Accepted finding (auto-generated baseline)". Do not commit that: a
# suppression nobody wrote a reason for is indistinguishable from hiding a real
# problem, and this project cannot afford that particular shortcut.
#
# Glob rules rather than fingerprints, deliberately. Fingerprints are content
# hashes, so editing a paragraph of the README invalidates its entry and fails
# CI on a docs change — which trains people to regenerate the baseline blindly,
# which is exactly the failure mode above. Glob rules survive rewording. The
# tradeoff is that they are broader: each one below is scoped by BOTH rule id
# and path to keep that breadth as small as the mechanism allows.
#
# Reproduce:   skillspector scan . --no-llm --baseline .skillspector-baseline.yaml
# Inspect:     add --show-suppressed
# Scanned with SkillSpector v2.3.13.
#
# If a new finding appears that you cannot write an honest reason for, it is not
# a false positive. Fix it.

version: 1

rules:

  # --- SC4: Known Vulnerable Dependency (3 CRITICAL, 2 HIGH) ------------------
  #
  # The score driver, and the one worth explaining carefully.
  #
  # SC4 queries OSV by package NAME and reports every advisory ever filed
  # against it, without filtering by the version actually declared. Verified
  # empirically: raising the floors to numpy>=2.3.0, pandas>=2.3.0,
  # scikit-learn>=1.7.0, PyYAML>=6.0.2 and pytest>=8.4.0, then re-scanning, left
  # all five findings and the 100/100 score completely unchanged. The advisories
  # include CVE-2014-1859 (numpy, 2014) and CVE-2019-20477 (PyYAML, 2019),
  # neither reachable from any version this project permits, and several are
  # DISPUTED upstream (CVE-2020-13091 pandas, CVE-2021-33430 numpy).
  #
  # Consequence: every project depending on the standard DS stack scores 100/100
  # CRITICAL "DO NOT INSTALL" regardless of what it pins. That is a property of
  # this check, not of this package. Suppressed rather than pinned away because
  # pinning demonstrably does not resolve it.
  #
  # Revisit if SC4 becomes version-aware upstream.
  - id: "SC4"
    path: "pyproject.toml"
    reason: >-
      SC4 is not version-aware: it lists every OSV advisory for a package name
      regardless of the declared floor. Verified by raising numpy/pandas/
      scikit-learn/PyYAML/pytest floors to current releases and re-scanning —
      identical findings, identical score. The advisories listed predate every
      version this project permits; several are DISPUTED upstream. PyYAML in
      particular is used only via yaml.safe_load() (tests/helpers.py), and
      pytest is a dev-only dependency never installed by plugin consumers.

  # --- SC2: External Script Fetching (HIGH) ----------------------------------
  #
  # Inverted findings. SkillSpector matches the literal curl-pipe-to-shell
  # string; in every file where it appears here, that string is a security
  # CONTROL. settings-baseline.json lists it under permissions.deny (the rule
  # that BLOCKS the pattern), test_plugin_structure.py asserts that deny rule
  # exists, and the README explains both. Flagging a project's own guardrail
  # because it names the thing it guards against is the definition of a false
  # positive.
  - id: "SC2"
    path: "settings-baseline.json"
    reason: >-
      The curl-pipe-to-shell string appears inside permissions.deny — it is the
      rule that blocks this pattern, not an invocation of it.
  - id: "SC2"
    path: "tests/test_plugin_structure.py"
    reason: >-
      Test asserting the curl-pipe-to-shell deny rules are present in
      settings-baseline.json. The string is the assertion's expected value.
  - id: "SC2"
    path: "README.md"
    reason: >-
      The Safety section documents this exact false positive, which requires
      naming the pattern it concerns.

  # --- AST4: subprocess module call (MEDIUM) ---------------------------------
  #
  # Every instance is a test invoking a hook script as a subprocess to exercise
  # its real runtime behavior. That is the only honest way to test these: Claude
  # Code executes hooks as separate processes, so testing them in-process would
  # test something no user ever runs. All calls use shell=False with a fixed
  # argv ([sys.executable, <path under hooks/>]) and no user-controlled input.
  # See AUDIT.md for what the hooks themselves do.
  - id: "AST4"
    path: "tests/*"
    reason: >-
      shell=False with a fixed argv list, running repo-local hook scripts under
      test (hooks are executed out-of-process by Claude Code, so in-process
      tests would not exercise the real path). No user-controlled input reaches
      the command.

  # --- AST7: dynamic attribute access ----------------------------------------
  - id: "AST7"
    path: "sealed_bet/seal.py"
    reason: >-
      getattr(module, fn_name) in load_baseline_fn — the documented
      --baseline-py extension point, which loads the user's own heuristic from
      an explicit 'path.py:function' spec they pass themselves. Guarded by a
      hasattr() check that raises a named AttributeError. Not attacker-
      controlled.

  # --- RP1: remote package install path (MEDIUM) -----------------------------
  #
  # These flag the documented install route (`npx stamkavid/last-ds-mile`, which
  # runs bin/install.mjs to add the marketplace and install the plugin). Real,
  # and worth a user knowing: it is disclosed prominently in the README
  # Quickstart rather than buried, and bin/install.mjs shells out only to the
  # user's own `claude` CLI. Accepted as an intentional, disclosed property of
  # the product.
  - id: "RP1"
    path: "bin/install.mjs"
    reason: >-
      The disclosed one-command installer; invokes only the user's own `claude`
      CLI to add the marketplace and install this plugin.
  - id: "RP1"
    path: "package.json"
    reason: The bin entry making `npx stamkavid/last-ds-mile` resolve to bin/install.mjs.
  - id: "RP1"
    path: "README.md"
    reason: Quickstart documents the npx install path; disclosure, not execution.
  - id: "RP1"
    path: "tests/test_plugin_structure.py"
    reason: Test asserting the installer is wired correctly; no install performed.

  # --- Documentation and prose matches ---------------------------------------
  - id: "AS3"
    path: "*.md"
    reason: >-
      "Skill Enumeration" matched prose citations of this project's own
      skills/*/SKILL.md paths in its README and changelog. Documentation
      referencing its own files.
  - id: "EA3"
    path: "LICENSE"
    reason: >-
      "Scope Creep" matched the phrase "NOT LIMITED TO" in the unmodified MIT
      license warranty clause.
  - id: "EA2"
    path: "skills/*"
    reason: >-
      "Autonomous Decision Making" matched "without checking" in ds-validate,
      inside a sentence instructing the reader TO check ("state that explicitly
      rather than choosing it by default without checking"). The finding is
      inverted.
  - id: "MP2"
    path: "tests/*"
    reason: >-
      "Context Window Stuffing" matched whitespace/line-length in a test file.
      No prompt content is involved.
  - id: "TM1"
    path: "PUBLISH_PLAN.md"
    reason: >-
      "Tool Parameter Abuse" matched flag names quoted in the pre-release
      planning document's own prose. PUBLISH_PLAN.md is a working file deleted
      at release, at which point this entry can go too.

fingerprints: []
